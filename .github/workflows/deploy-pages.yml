name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-dotcom
  cancel-in-progress: true

env:
  PAGES_ARTIFACT_PATH: _site

jobs:
  build:
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude '_site/' \
            --exclude 'node_modules/' \
            --exclude 'scripts/' \
            --exclude 'tests/' \
            --exclude 'AGENTS.md' \
            --exclude 'README.md' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude '*.md' \
            ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_ARTIFACT_PATH }}

  deploy:
    if: github.server_url == 'https://github.com'
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
