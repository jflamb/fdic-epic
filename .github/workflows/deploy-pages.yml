name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          mkdir _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude '.claude/' \
            --exclude '_site/' \
            --exclude 'node_modules/' \
            --exclude 'scripts/' \
            --exclude 'tests/' \
            --exclude 'AGENTS.md' \
            --exclude 'README.md' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude '*.md' \
            ./ _site/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./_site
          force_orphan: true
